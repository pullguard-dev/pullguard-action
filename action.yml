# PullGuard — Code quality, security & compliance on every PR.
# Free tier (12 analyzers) works with no license key.
# Pro/Enterprise (27 analyzers) unlocked via PULLGUARD_LICENSE_KEY secret.
#
# Usage:
#   - uses: bazza1love/pullguard-action@v1
#
# With Pro/Enterprise:
#   - uses: bazza1love/pullguard-action@v1
#     with:
#       license-key: ${{ secrets.PULLGUARD_LICENSE_KEY }}

name: 'PullGuard Code Scanner'
description: 'Code quality, security & compliance on every PR. 27 analyzers, N-hop taint tracking, SOC 2 compliance, cost estimation.'
author: 'PullGuard'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  license-key:
    description: 'PullGuard license key. Free tier (12 analyzers) works without a key. Pro/Enterprise unlocks all 27.'
    required: false
    default: ''
  fail-on-severity:
    description: 'Fail the workflow at this severity or above: info, minor, moderate, major, critical.'
    required: false
    default: ''
  hourly-rate:
    description: 'Developer hourly rate for cost estimation (USD).'
    required: false
    default: '150'
  config:
    description: 'Path to .driftrc.yml config file (relative to repo root).'
    required: false
    default: ''
  path:
    description: 'Path to scan (relative to repo root).'
    required: false
    default: '.'

outputs:
  score:
    description: 'Drift score (0-100, lower is better)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Drift grade (A-F)'
    value: ${{ steps.scan.outputs.grade }}
  findings:
    description: 'Total finding count'
    value: ${{ steps.scan.outputs.findings }}

runs:
  using: 'composite'
  steps:
    - name: Run PullGuard analysis
      id: scan
      shell: bash
      env:
        PULLGUARD_LICENSE_KEY: ${{ inputs.license-key }}
        PULLGUARD_FAIL_SEVERITY: ${{ inputs.fail-on-severity }}
        PULLGUARD_HOURLY_RATE: ${{ inputs.hourly-rate }}
        PULLGUARD_CONFIG: ${{ inputs.config }}
        PULLGUARD_SCAN_PATH: ${{ inputs.path }}
      run: |
        # Copy the GitHub event JSON into workspace so the container can read it
        cp "$GITHUB_EVENT_PATH" "${{ github.workspace }}/.github-event.json" 2>/dev/null || true

        docker pull ghcr.io/bazza1love/pullguard:latest 2>/dev/null
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -e GITHUB_TOKEN="${{ github.token }}" \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
          -e GITHUB_EVENT_PATH="/workspace/.github-event.json" \
          -e GITHUB_SHA="${{ github.sha }}" \
          -e GITHUB_STEP_SUMMARY="/workspace/.pullguard-step-summary.md" \
          -e GITHUB_OUTPUT="/workspace/.pullguard-output" \
          -e GITHUB_WORKSPACE="/workspace" \
          -e PULLGUARD_LICENSE_KEY="${PULLGUARD_LICENSE_KEY}" \
          -e PULLGUARD_FAIL_SEVERITY="${PULLGUARD_FAIL_SEVERITY}" \
          -e PULLGUARD_HOURLY_RATE="${PULLGUARD_HOURLY_RATE}" \
          -e PULLGUARD_CONFIG="${PULLGUARD_CONFIG}" \
          -e PULLGUARD_SCAN_PATH="${PULLGUARD_SCAN_PATH}" \
          ghcr.io/bazza1love/pullguard:latest || true

        # Copy container outputs to actual GitHub paths
        if [ -f "${{ github.workspace }}/.pullguard-step-summary.md" ]; then
          cat "${{ github.workspace }}/.pullguard-step-summary.md" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -f "${{ github.workspace }}/.pullguard-output" ]; then
          cat "${{ github.workspace }}/.pullguard-output" >> "$GITHUB_OUTPUT"
        fi

        # Clean up temp files
        rm -f "${{ github.workspace }}/.github-event.json" \
              "${{ github.workspace }}/.pullguard-step-summary.md" \
              "${{ github.workspace }}/.pullguard-output" 2>/dev/null || true

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pullguard-report
        path: |
          drift-report.json
          drift-report.md
        retention-days: 30
        if-no-files-found: ignore
