# WHY: GitHub Marketplace Action for one-line PullGuard setup.
# Free tier (14 analyzers) works with no license key.
# Pro (31 analyzers / 1 repo) / Team (all 32 / 10 repos) / Enterprise (unlimited, contact sales) unlocked via PULLGUARD_LICENSE_KEY secret.
#
# Usage:
#   - uses: pullguard-dev/pullguard-action@v1
#
# With Pro/Team/Enterprise:
#   - uses: pullguard-dev/pullguard-action@v1
#     with:
#       license-key: ${{ secrets.PULLGUARD_LICENSE_KEY }}

name: 'PullGuard Code Scanner'
description: 'Code quality, security & compliance on every PR. 32 analyzers, N-hop taint tracking, SOC 2 evidence, cost estimation.'
author: 'PullGuard'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  license-key:
    description: 'PullGuard license key — unlocks Pro (31 of 32 analyzers; 1 repo), Team (all 32 incl. custom-rules + SOC 2; 10 repos), or Enterprise (all 32; unlimited repos + SSO + SLA — contact sales). Free tier (14 analyzers: core + dangerous-files + repo-hygiene) works without a key.'
    required: false
    default: ''
  fail-on-severity:
    description: 'Fail the workflow if findings at this severity or above exist. Options: info, minor, moderate, major, critical. Default: empty (never fail).'
    required: false
    default: ''
  hourly-rate:
    description: 'Developer hourly rate for cost estimation. Default: 150.'
    required: false
    default: '150'
  config:
    description: 'Path to .driftrc.yml configuration file (relative to repo root).'
    required: false
    default: ''
  path:
    description: 'Path to scan (relative to repo root). Default: entire repo.'
    required: false
    default: '.'
  report-to-app:
    description: 'When true, POST the scan report to the PullGuard GitHub App backend (/api/app/report) so findings appear as native Check Run annotations on the PR Files-changed view. Requires the PullGuard App to be installed on the repo. Default: false (backwards-compatible; Step Summary + PR comment still render).'
    required: false
    default: 'false'

outputs:
  score:
    description: 'Drift score (0-100, lower is better)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Drift grade (A-F)'
    value: ${{ steps.scan.outputs.grade }}
  findings:
    description: 'Total finding count'
    value: ${{ steps.scan.outputs.findings }}

runs:
  using: 'composite'
  steps:
    - name: Run PullGuard analysis
      id: scan
      shell: bash
      env:
        PULLGUARD_LICENSE_KEY: ${{ inputs.license-key }}
        PULLGUARD_FAIL_SEVERITY: ${{ inputs.fail-on-severity }}
        PULLGUARD_HOURLY_RATE: ${{ inputs.hourly-rate }}
        PULLGUARD_CONFIG: ${{ inputs.config }}
        PULLGUARD_SCAN_PATH: ${{ inputs.path }}
        PULLGUARD_REPORT_TO_APP: ${{ inputs.report-to-app }}
      # WHY: Pull and run the Docker image directly. The entrypoint handles
      # everything: scan, step summary, PR comment, severity threshold, outputs.
      # Using docker run instead of container: directive gives us control over
      # env var mapping and works as a composite action step.
      run: |
        docker pull ghcr.io/pullguard-dev/pullguard:latest
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -e GITHUB_TOKEN="${{ github.token }}" \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
          -e GITHUB_EVENT_PATH="/workspace/.github-event.json" \
          -e GITHUB_SHA="${{ github.sha }}" \
          -e GITHUB_STEP_SUMMARY="/workspace/.step-summary.md" \
          -e GITHUB_OUTPUT="/workspace/.github-output" \
          -e GITHUB_WORKSPACE="/workspace" \
          -e PULLGUARD_LICENSE_KEY="${PULLGUARD_LICENSE_KEY}" \
          -e PULLGUARD_FAIL_SEVERITY="${PULLGUARD_FAIL_SEVERITY}" \
          -e PULLGUARD_HOURLY_RATE="${PULLGUARD_HOURLY_RATE}" \
          -e PULLGUARD_CONFIG="${PULLGUARD_CONFIG}" \
          -e PULLGUARD_SCAN_PATH="${PULLGUARD_SCAN_PATH}" \
          -e PULLGUARD_REPORT_TO_APP="${PULLGUARD_REPORT_TO_APP}" \
          ghcr.io/pullguard-dev/pullguard:latest

        # WHY: Copy outputs from container-written files to actual GitHub paths
        if [ -f "${{ github.workspace }}/.step-summary.md" ]; then
          cat "${{ github.workspace }}/.step-summary.md" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -f "${{ github.workspace }}/.github-output" ]; then
          cat "${{ github.workspace }}/.github-output" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pullguard-report
        path: |
          drift-report.json
          drift-report.md
        retention-days: 30
        if-no-files-found: ignore
